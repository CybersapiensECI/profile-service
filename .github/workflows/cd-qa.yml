name: CD – Deploy to QA

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: cybersapienseci/profile-service
  RESOURCE_GROUP: alphaECI-prod

jobs:

  build-and-push:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:qa-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-qa:
    name: "Deploy to QA"
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to QA Container App
        run: |
          az containerapp update \
            --name alphaeci-profile-service-qa \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:qa-latest

      - name: Health check QA
        run: |
          sleep 30
          STATUS=$(az containerapp show \
            --name alphaeci-profile-service-qa \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.runningStatus" -o tsv)
          echo "QA status: $STATUS"
          if [ "$STATUS" != "Running" ]; then
            echo "QA health check failed"
            exit 1
          fi
